<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hand Keyboard — test bed</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="kb">
  <div id="kbstage">
    <div class="kb-wrap">
      <div class="kb-title">HAND KEYBOARD</div>
      <div class="re-initials" id="kbDisplay">&nbsp;</div>
      <!-- shared hand keyboard component mounts its QWERTY keys here (see src/handkeyboard.ts) -->
      <div class="re-grid" id="kbGrid"><div class="init-cursor" id="kbCursor"></div></div>
      <div class="re-hint">move your hand &middot; pinch finger to thumb to press &middot; DEL / OK &middot; or type</div>
      <div class="kb-result" id="kbResult"></div>
    </div>

    <div id="camBox">
      <video id="cam" autoplay playsinline muted></video>
      <canvas id="camOverlay"></canvas>
    </div>

    <a class="home-link" href="/">&larr; home</a>
    <div id="boot">loading model&hellip;</div>
  </div>

  <script type="module" src="/src/keyboard.ts"></script>
</body>
</html>
