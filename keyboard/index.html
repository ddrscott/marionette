<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hand Keyboard — test bed</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="kb">
  <div id="kbstage">
    <!-- Title pinned to the TOP (positioned independently of the bottom-anchored keyboard stack). -->
    <div class="kb-title">AIR KEYBOARD FOR GERMAPHOBES</div>

    <!-- How-to-play OVERLAY: blocks the game until dismissed by click, tap, or hand-PINCH on the button
         (it's a registered press target). Dismissing starts the countdown — the hand is already in view. -->
    <div class="kb-howto" id="kbHowto">
      <div class="kb-howto-card">
        <div class="kb-dir-title">how to play</div>
        <ul>
          <li>Raise your hand to the camera.</li>
          <li>Pinch your finger to your thumb to press the highlighted key.</li>
          <li>Move your hand out of frame to pause.</li>
        </ul>
        <button class="kb-btn kb-gotit" id="kbGotIt" type="button">pinch me if you got it</button>
      </div>
    </div>

    <!-- The KEYBOARD is always the LOWEST element; every other bit of UI stacks ABOVE it (the wrap is
         bottom-anchored, so DOM order top→bottom = screen top→bottom, keys last). -->
    <div class="kb-wrap">
      <!-- phrase (typed-progress) or the big initials slots — see src/keyboard.ts renderPrompt/renderInitials -->
      <div class="kb-prompt" id="kbPrompt"></div>
      <div class="kb-timer" id="kbTimer">0.0s</div>
      <div class="kb-result" id="kbResult"></div>
      <!-- per-phrase global leaderboard (done screen; see src/keyboard.ts renderBoard) — ABOVE the keyboard -->
      <div class="kb-board" id="kbBoard" hidden></div>
      <!-- state buttons: paused (resume/reset/new), initials (submit/new), done (reset/new). Hand-pressable
           (HandKeyboard.addPressTarget) + mouse/tap. -->
      <div class="kb-buttons" id="kbButtons">
        <button class="kb-btn" id="kbResume" type="button" hidden>resume</button>
        <button class="kb-btn" id="kbReset" type="button" hidden>reset</button>
        <button class="kb-btn" id="kbNew" type="button" hidden>new phrase</button>
        <button class="kb-btn" id="kbSubmit" type="button" hidden>submit</button>
      </div>
      <div class="re-hint" id="kbHint">raise your hand to start &middot; pinch each letter to type</div>
      <!-- shared hand keyboard mounts its keys here (src/handkeyboard.ts) — LAST = lowest on screen -->
      <div class="re-grid" id="kbGrid"><div class="init-cursor" id="kbCursor"></div></div>
    </div>

    <div id="camBox">
      <video id="cam" autoplay playsinline muted></video>
      <canvas id="camOverlay"></canvas>
    </div>

    <a class="home-link" href="/">&larr; home</a>
    <button id="fsBtn" class="fs-btn" type="button" title="Fullscreen" aria-label="Toggle fullscreen"></button>
    <div id="boot">loading model&hellip;</div>
  </div>

  <script type="module" src="/src/keyboard.ts"></script>
</body>
</html>
