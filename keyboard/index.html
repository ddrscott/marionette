<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hand Keyboard — test bed</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="kb">
  <div id="kbstage">
    <div class="kb-wrap">
      <div class="kb-title">AIR KEYBOARD FOR GERMAPHOBES</div>
      <!-- the phrase to type, with typed-progress highlighting (see src/keyboard.ts renderPrompt) -->
      <div class="kb-prompt" id="kbPrompt"></div>
      <div class="kb-typed" id="kbDisplay">&nbsp;</div>
      <div class="kb-timer" id="kbTimer">0.0s</div>
      <!-- shared hand keyboard component mounts its keys here (see src/handkeyboard.ts) -->
      <div class="re-grid" id="kbGrid"><div class="init-cursor" id="kbCursor"></div></div>
      <div class="re-hint" id="kbHint">raise your hand to start &middot; type the phrase &middot; pinch to press, pinky-pinch = delete</div>
      <div class="kb-result" id="kbResult"></div>
      <button class="kb-next" id="kbNext" type="button" hidden>next phrase</button>
    </div>

    <div id="camBox">
      <video id="cam" autoplay playsinline muted></video>
      <canvas id="camOverlay"></canvas>
    </div>

    <a class="home-link" href="/">&larr; home</a>
    <button id="fsBtn" class="fs-btn" type="button" title="Fullscreen" aria-label="Toggle fullscreen"></button>
    <div id="boot">loading model&hellip;</div>

    <!-- DIAGNOSTIC-ONLY pinch/confidence overlay (see src/keyboard.ts updateDebug). Read-only: mirrors
         the exact ratios + gate the detector uses. Remove this block + the #dbg CSS + updateDebug to
         delete the overlay entirely; nothing else depends on it. -->
    <div id="dbg">
      <label class="dbg-head"><input type="checkbox" id="dbgToggle" checked /> debug</label>
      <pre id="dbgBody"></pre>
    </div>
  </div>

  <script type="module" src="/src/keyboard.ts"></script>
</body>
</html>
