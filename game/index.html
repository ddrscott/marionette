<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marionette Fighter</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="game">
  <div id="stage">
    <canvas id="scene"></canvas>

    <!-- HUD overlay (Street Fighter layout): power bars + timer + round pips, then the announcer -->
    <div id="hud">
      <div class="hud-top">
        <div class="side left">
          <div class="pname">PLAYER 1</div>
          <div class="pbar"><div class="fill" id="p0fill"></div></div>
          <div class="pips" id="p0pips"></div>
        </div>
        <div class="center">
          <div class="timer" id="timer">99</div>
          <div class="rounds">BEST OF 5</div>
          <div class="streak" id="streak"></div>
          <div class="rec" id="rec"></div>
        </div>
        <div class="side right">
          <div class="pname">PLAYER 2</div>
          <div class="pbar"><div class="fill" id="p1fill"></div></div>
          <div class="pips" id="p1pips"></div>
        </div>
      </div>
      <div class="announce"><div id="annc"></div><div id="annsub"></div></div>
    </div>

    <!-- small self-view, just enough to line your hands up during calibration -->
    <div id="camBox">
      <video id="cam" autoplay playsinline muted></video>
      <canvas id="camOverlay"></canvas>
    </div>

    <!-- arcade high-score entry, shown only when a win streak breaks the record -->
    <div id="recordEntry" class="record-entry" hidden>
      <div class="re-title">NEW RECORD</div>
      <div class="re-streak" id="reStreak"></div>
      <div class="re-initials" id="reInitials">_ _ _</div>
      <!-- hand-driven A–Z picker: point with the index finger, tuck the thumb to select. Cells built in game.ts. -->
      <div class="re-grid" id="initGrid"><div class="init-cursor" id="initCursor"></div></div>
      <div class="re-hint">point &amp; tuck your thumb to pick &middot; or type</div>
    </div>

    <a class="home-link" href="/">&larr; home</a>
    <button id="fsBtn" class="fs-btn" type="button" title="Fullscreen" aria-label="Toggle fullscreen"></button>
    <button id="muteBtn" class="mute-btn" type="button" title="Mute (M)" aria-label="Toggle sound"></button>
    <div id="soundHint">click or press any key for sound</div>
    <div id="boot">loading model + physics&hellip;</div>
  </div>

  <!-- portrait-lock: shown (via CSS) only on touch devices held in portrait -->
  <div class="rotate-gate">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
    <div class="rg-title">Rotate to landscape</div>
    <div class="rg-sub">turn your device sideways to play</div>
  </div>

  <script type="module" src="/src/game.ts"></script>
</body>
</html>
